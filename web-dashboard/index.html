<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="카드 결제 내역을 자동으로 수집하고 분석하는 스마트 가계부" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>스마트 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <div id="app">
    <!-- 상단 헤더 -->
    <header class="app-header" id="appHeader">
      <div class="header-left">
        <h1 class="header-title">스마트 가계부</h1>
        <p class="header-subtitle" id="headerSubtitle">2026년 6월</p>
      </div>
      <div class="header-right">
        <button class="month-nav-btn" id="prevMonth" aria-label="이전 달">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="month-nav-btn" id="nextMonth" aria-label="다음 달">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- 페이지 컨테이너 -->
    <main class="page-container" id="pageContainer">

      <!-- ===== 홈 탭 ===== -->
      <section class="page active" id="page-home">
        <!-- 총 지출 카드 -->
        <div class="summary-card glass-card">
          <p class="summary-label">이번 달 총 지출</p>
          <h2 class="summary-amount" id="totalSpending">₩0</h2>
          <div class="summary-meta">
            <span class="summary-badge" id="transactionCount">0건 결제</span>
            <span class="summary-change" id="monthlyChange">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 11V3M7 3L3 7M7 3L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              전월 대비 -
            </span>
          </div>
        </div>

        <!-- 카드 실적 요약 -->
        <div class="section-header">
          <h3 class="section-title">카드별 실적</h3>
          <button class="section-link" data-navigate="cards">전체보기</button>
        </div>
        <div class="cards-grid-home" id="cardGridHome">
          <!-- JS로 동적 생성 -->
        </div>

        <!-- 최근 결제 내역 -->
        <div class="section-header">
          <h3 class="section-title">최근 결제 내역</h3>
        </div>
        <div class="transaction-list" id="transactionList">
          <!-- JS로 동적 생성 -->
        </div>
      </section>

      <!-- ===== 카드 탭 ===== -->
      <section class="page" id="page-cards">
        <div class="cards-grid" id="cardsGrid">
          <!-- JS로 동적 생성 -->
        </div>
      </section>

      <!-- ===== 분석 탭 ===== -->
      <section class="page" id="page-analysis">
        <!-- 카테고리별 지출 -->
        <div class="glass-card chart-card">
          <h3 class="chart-title">카테고리별 지출</h3>
          <div class="chart-container">
            <div class="donut-chart-wrapper">
              <svg class="donut-chart" id="donutChart" viewBox="0 0 200 200"></svg>
              <div class="donut-center">
                <span class="donut-center-amount" id="donutCenterAmount">₩0</span>
                <span class="donut-center-label">총 지출</span>
              </div>
            </div>
          </div>
          <div class="category-legend" id="categoryLegend">
            <!-- JS로 동적 생성 -->
          </div>
        </div>

        <!-- 일별 지출 추이 -->
        <div class="glass-card chart-card">
          <h3 class="chart-title">일별 지출 추이</h3>
          <div class="bar-chart-container" id="barChartContainer">
            <!-- JS로 동적 생성 -->
          </div>
        </div>
      </section>

      <!-- ===== 설정 탭 ===== -->
      <section class="page" id="page-settings">
        <!-- 카드 관리 -->
        <div class="settings-section">
          <h3 class="settings-section-title">💳 카드 관리</h3>
          <div class="settings-card-list" id="settingsCardList">
            <!-- JS로 동적 생성 -->
          </div>
          <button class="add-card-btn" id="addCardBtn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            새 카드 추가
          </button>
        </div>

        <!-- 월 초기 설정 -->
        <div class="settings-section">
          <h3 class="settings-section-title">🏦 월 초기 설정</h3>
          <div class="settings-item glass-card">
            <label class="settings-label" for="initialBalance">월 초기 통장잔액</label>
            <div class="settings-input-group">
              <span class="input-prefix">₩</span>
              <input type="text" id="initialBalance" class="settings-input" placeholder="1,250,000" inputmode="numeric" />
            </div>
          </div>
        </div>

        <!-- 연동 설정 -->
        <div class="settings-section">
          <h3 class="settings-section-title">🔗 스프레드시트 연동</h3>
          <div class="settings-item glass-card">
            <label class="settings-label" for="sheetUrl">Google 스프레드시트 URL</label>
            <input type="url" id="sheetUrl" class="settings-input full-width" placeholder="https://docs.google.com/spreadsheets/d/..." />
          </div>
          <div class="settings-item glass-card">
            <label class="settings-label" for="appsScriptUrl">Apps Script 웹훅 URL</label>
            <input type="url" id="appsScriptUrl" class="settings-input full-width" placeholder="https://script.google.com/macros/s/..." />
          </div>
        </div>

        <button class="save-settings-btn" id="saveSettingsBtn">설정 저장</button>
      </section>
    </main>

    <!-- 하단 탭 네비게이션 -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-tab="home" id="nav-home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.5523 5.44772 21 6 21H9M19 10L21 12M19 10V20C19 20.5523 18.5523 21 18 21H15M9 21C9 21 9 15.5 12 15.5C15 15.5 15 21 15 21M9 21H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-item" data-tab="cards" id="nav-cards">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M3 10H21M7 15H8M12 15H13M6 19H18C19.6569 19 21 17.6569 21 16V8C21 6.34315 19.6569 5 18 5H6C4.34315 5 3 6.34315 3 8V16C3 17.6569 4.34315 19 6 19Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="nav-label">카드</span>
      </button>
      <button class="nav-item" data-tab="analysis" id="nav-analysis">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M9 19V13C9 11.8954 8.10457 11 7 11H5C3.89543 11 3 11.8954 3 13V19C3 20.1046 3.89543 21 5 21H7C8.10457 21 9 20.1046 9 19ZM9 19V9C9 7.89543 9.89543 7 11 7H13C14.1046 7 15 7.89543 15 9V19M9 19C9 20.1046 9.89543 21 11 21H13C14.1046 21 15 20.1046 15 19M15 19V5C15 3.89543 15.8954 3 17 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H17C15.8954 21 15 20.1046 15 19Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="nav-label">분석</span>
      </button>
      <button class="nav-item" data-tab="settings" id="nav-settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M10.325 4.317C10.751 2.561 13.249 2.561 13.675 4.317C13.7389 4.5808 13.8642 4.82578 14.0407 5.032C14.2172 5.23822 14.4399 5.39985 14.6907 5.50375C14.9414 5.60764 15.2132 5.65085 15.4838 5.62987C15.7544 5.60889 16.0162 5.5243 16.248 5.383C17.791 4.443 19.558 6.209 18.618 7.753C18.4769 7.98466 18.3924 8.24634 18.3715 8.51677C18.3506 8.78721 18.3938 9.05877 18.4975 9.30938C18.6013 9.55999 18.7627 9.78258 18.9687 9.95905C19.1747 10.1355 19.4194 10.2609 19.683 10.325C21.439 10.751 21.439 13.249 19.683 13.675C19.4192 13.7389 19.1742 13.8642 18.968 14.0407C18.7618 14.2172 18.6001 14.4399 18.4963 14.6907C18.3924 14.9414 18.3491 15.2132 18.3701 15.4838C18.3911 15.7544 18.4757 16.0162 18.617 16.248C19.557 17.791 17.791 19.558 16.247 18.618C16.0153 18.4769 15.7537 18.3924 15.4832 18.3715C15.2128 18.3506 14.9412 18.3938 14.6906 18.4975C14.44 18.6013 14.2174 18.7627 14.0409 18.9687C13.8645 19.1747 13.7391 19.4194 13.675 19.683C13.249 21.439 10.751 21.439 10.325 19.683C10.2611 19.4192 10.1358 19.1742 9.95929 18.968C9.7828 18.7618 9.56011 18.6001 9.30935 18.4963C9.05859 18.3924 8.78683 18.3491 8.51621 18.3701C8.24559 18.3911 7.98375 18.4757 7.752 18.617C6.209 19.557 4.442 17.791 5.382 16.247C5.5231 16.0153 5.60755 15.7537 5.62848 15.4832C5.64942 15.2128 5.60624 14.9412 5.50247 14.6906C5.3987 14.44 5.23726 14.2174 5.03127 14.0409C4.82529 13.8645 4.58056 13.7391 4.317 13.675C2.561 13.249 2.561 10.751 4.317 10.325C4.5808 10.2611 4.82578 10.1358 5.032 9.95929C5.23822 9.7828 5.39985 9.56011 5.50375 9.30935C5.60764 9.05859 5.65085 8.78683 5.62987 8.51621C5.60889 8.24559 5.5243 7.98375 5.383 7.752C4.443 6.209 6.209 4.442 7.753 5.382C8.753 5.99 10.049 5.452 10.325 4.317Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="nav-label">설정</span>
      </button>
    </nav>

    <!-- 카드 추가/수정 모달 -->
    <div class="modal-overlay" id="cardModal">
      <div class="modal glass-card">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">새 카드 추가</h3>
          <button class="modal-close" id="modalClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <form id="cardForm" class="modal-form">
          <input type="hidden" id="cardEditId" />
          <div class="form-group">
            <label for="cardName">카드 이름</label>
            <input type="text" id="cardName" placeholder="예: 신한카드" required />
          </div>
          <div class="form-group">
            <label for="cardType">카드 유형</label>
            <select id="cardType">
              <option value="credit">신용카드</option>
              <option value="local">지역화폐</option>
            </select>
          </div>
          <div class="form-group">
            <label for="cardLimit">월 실적 기준 (₩)</label>
            <input type="text" id="cardLimit" placeholder="없으면 비워두세요" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label for="cardColor">카드 색상</label>
            <div class="color-picker" id="colorPicker">
              <button type="button" class="color-swatch active" data-color="#6366f1" style="background: #6366f1;"></button>
              <button type="button" class="color-swatch" data-color="#8b5cf6" style="background: #8b5cf6;"></button>
              <button type="button" class="color-swatch" data-color="#ec4899" style="background: #ec4899;"></button>
              <button type="button" class="color-swatch" data-color="#f59e0b" style="background: #f59e0b;"></button>
              <button type="button" class="color-swatch" data-color="#10b981" style="background: #10b981;"></button>
              <button type="button" class="color-swatch" data-color="#3b82f6" style="background: #3b82f6;"></button>
              <button type="button" class="color-swatch" data-color="#ef4444" style="background: #ef4444;"></button>
              <button type="button" class="color-swatch" data-color="#14b8a6" style="background: #14b8a6;"></button>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="modalCancelBtn">취소</button>
            <button type="submit" class="btn btn-primary">저장</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 토스트 메시지 -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered: ', registration);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>
</html>
